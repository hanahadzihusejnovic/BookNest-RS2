version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: booknest-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - booknest-network
    restart: unless-stopped

  booknest-subscriber:
    build:
      context: .
      dockerfile: BookNest.Subscriber/Dockerfile
    container_name: booknest-subscriber
    ports:
      - "7111:7111"
    depends_on:
      - rabbitmq
    networks:
      - booknest-network
    restart: unless-stopped

networks:
  booknest-network:
    driver: bridge

volumes:
  rabbitmq-data: